name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Configure stable Rust
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update --component rustfmt,clippy
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustc --version
          cargo --version

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Cache wasm-pack toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            ~/.cargo/registry
            ~/.cargo/git
          key: wasm-pack-${{ runner.os }}-0.15.0

      - name: Install wasm-pack
        shell: bash
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --locked --version 0.15.0
          fi
          wasm-pack --version

      - name: Apply official Rust formatting
        run: cargo fmt --all

      - name: Commit formatter result to validation branch
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          if git diff --quiet -- crates/core; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/core
          git commit -m "style: apply rustfmt"
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Rust formatting check
        run: npm run format:rust

      - name: Rust lint
        run: npm run lint:rust

      - name: Unit and contract tests
        run: npm test

      - name: Production build with captured log
        id: production
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee production-build.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Verify generated WASM and package layout
        if: steps.production.outputs.status == '0'
        shell: bash
        run: |
          test -s packages/engine/dist/wasm/audio_game_core_bg.wasm
          test -s packages/engine/dist/wasm/audio_game_core.js
          test -s demo/dist/engine/wasm/audio_game_core_bg.wasm
          npm run test:wasm
          echo "WASM bytes: $(wc -c < packages/engine/dist/wasm/audio_game_core_bg.wasm)"
          echo "Engine package bytes: $(du -sb packages/engine/dist | cut -f1)"

      - name: Install browser runtimes
        if: steps.production.outputs.status == '0'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Browser smoke tests
        if: steps.production.outputs.status == '0'
        run: npm run test:e2e

      - name: Require successful production build
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.production.outputs.status }}" != "0" ]]; then
            cat production-build.log || true
            echo "Production build failed. Inspect production-build.log."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aaja-audio-demo-${{ github.run_attempt }}
          path: |
            demo/dist
            packages/engine/dist
            playwright-report
            test-results
            production-build.log
          if-no-files-found: warn
          retention-days: 7
