name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Expand the initial repository payload
        id: bootstrap
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          chunks=(bootstrap/chunk-*)
          if (( ${#chunks[@]} == 0 )); then
            echo "expanded=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cat "${chunks[@]}" | base64 --decode > "$RUNNER_TEMP/aaja-project.tar.gz"
          tar -xzf "$RUNNER_TEMP/aaja-project.tar.gz" -C .
          rm -rf bootstrap
          echo "expanded=true" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Rust formatting
        run: npm run format:rust

      - name: Rust lint
        run: npm run lint:rust

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Verify generated WASM
        run: |
          test -s packages/engine/dist/wasm/audio_game_core_bg.wasm
          npm run test:wasm

      - name: Install browser runtimes
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Browser smoke tests
        run: npm run test:e2e

      - name: Commit the verified project tree
        if: steps.bootstrap.outputs.expanded == 'true' && github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Build accessible Rust WASM audio engine"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aaja-audio-demo-${{ github.run_attempt }}
          path: |
            demo/dist
            packages/engine/dist
            playwright-report
          if-no-files-found: warn
