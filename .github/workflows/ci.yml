name: CI

on:
  push:
  pull_request:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Avoid a third-party Rust setup action so repositories that only allow
      # GitHub-owned actions can still run the workflow.
      - name: Configure stable Rust
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update --component rustfmt,clippy
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustc --version
          cargo --version

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.15.0

      - name: Format Rust working tree and capture patch
        shell: bash
        run: |
          cargo fmt --all
          git diff -- crates/core > rustfmt.patch

      - name: Rust lint
        run: npm run lint:rust

      - name: Capture unit and contract test result
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          status=$?
          printf '%s\n' "$status" > test.status
          cat test.log
          exit 0

      - name: Require successful unit and contract tests
        shell: bash
        run: |
          status="$(cat test.status)"
          if [[ "$status" != "0" ]]; then
            echo "Unit or contract tests failed with exit code $status."
            exit "$status"
          fi

      - name: Capture production build result
        shell: bash
        run: |
          set +e
          npm run build > build.log 2>&1
          status=$?
          printf '%s\n' "$status" > build.status
          cat build.log
          exit 0

      - name: Require successful production build
        shell: bash
        run: |
          status="$(cat build.status)"
          if [[ "$status" != "0" ]]; then
            echo "Production build failed with exit code $status."
            exit "$status"
          fi

      - name: Verify generated WASM and package layout
        shell: bash
        run: |
          test -s packages/engine/dist/wasm/audio_game_core_bg.wasm
          test -s packages/engine/dist/wasm/audio_game_core.js
          test -s demo/dist/engine/wasm/audio_game_core_bg.wasm
          npm run test:wasm
          echo "WASM bytes: $(wc -c < packages/engine/dist/wasm/audio_game_core_bg.wasm)"
          echo "Engine package bytes: $(du -sb packages/engine/dist | cut -f1)"

      - name: Install browser runtimes
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Browser smoke tests
        run: npm run test:e2e

      - name: Require committed Rust formatting
        if: always()
        shell: bash
        run: |
          if [[ -s rustfmt.patch ]]; then
            cat rustfmt.patch
            echo "Rust formatter changed tracked files. Apply rustfmt.patch and rerun CI."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aaja-audio-demo-${{ github.run_attempt }}
          path: |
            test.log
            test.status
            build.log
            build.status
            demo/dist
            packages/engine/dist
            playwright-report
            test-results
            rustfmt.patch
          if-no-files-found: warn
          retention-days: 7

  materialize-real-audio:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feature/real-world-audio-tests'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fixed same-repository feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/real-world-audio-tests
          fetch-depth: 0

      - name: Install audio tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Download and convert selected real Foley
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .audio-work
          mkdir -p .audio-work/rpg .audio-work/impact .audio-work/loop demo/assets/audio
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/rpg-audio/8e99002d76-1677590336/kenney_rpg-audio.zip" \
            -o .audio-work/rpg.zip
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/impact-sounds/87b4ddecda-1677589768/kenney_impact-sounds.zip" \
            -o .audio-work/impact.zip
          unzip -q .audio-work/rpg.zip -d .audio-work/rpg
          unzip -q .audio-work/impact.zip -d .audio-work/impact
          door="$(find .audio-work/rpg -type f -name 'doorClose_2.ogg' -print -quit)"
          step="$(find .audio-work/impact -type f -name 'footstep_wood_000.ogg' -print -quit)"
          rpg_license="$(find .audio-work/rpg -type f -iname 'License.txt' -print -quit)"
          impact_license="$(find .audio-work/impact -type f -iname 'License.txt' -print -quit)"
          test -n "$door" && test -n "$step" && test -n "$rpg_license" && test -n "$impact_license"
          ffmpeg -v error -y -i "$door" -ac 1 -ar 48000 -c:a pcm_s16le demo/assets/audio/door-close.wav
          ffmpeg -v error -y -i "$step" -ac 1 -ar 48000 -c:a pcm_s16le .audio-work/loop/step.wav
          ffmpeg -v error -y -f lavfi -i anullsrc=r=48000:cl=mono -t 0.48 -c:a pcm_s16le .audio-work/loop/pause.wav
          ffmpeg -v error -y -f lavfi -i anullsrc=r=48000:cl=mono -t 0.70 -c:a pcm_s16le .audio-work/loop/pause-long.wav
          cat > .audio-work/loop/concat.txt <<'EOF'
          file 'step.wav'
          file 'pause.wav'
          file 'step.wav'
          file 'pause-long.wav'
          EOF
          ffmpeg -v error -y -f concat -safe 0 -i .audio-work/loop/concat.txt \
            -ac 1 -ar 48000 -c:a pcm_s16le demo/assets/audio/wood-footsteps-loop.wav
          cp "$rpg_license" demo/assets/audio/KENNEY_RPG_AUDIO_LICENSE.txt
          cp "$impact_license" demo/assets/audio/KENNEY_IMPACT_SOUNDS_LICENSE.txt
          for file in demo/assets/audio/*.wav; do
            test "$(head -c 4 "$file")" = "RIFF"
            test "$(dd if="$file" bs=1 skip=8 count=4 status=none)" = "WAVE"
          done

      - name: Commit audio assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .audio-work
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f demo/assets/audio
          git diff --cached --check
          if git diff --cached --quiet; then
            echo "Audio assets already materialized."
            exit 0
          fi
          git commit -m "Add real Foley reference sounds"
          git push origin HEAD:feature/real-world-audio-tests
