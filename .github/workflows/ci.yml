name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Avoid a third-party Rust setup action so repositories that only allow
      # GitHub-owned actions can still run the workflow.
      - name: Configure stable Rust
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update --component rustfmt,clippy
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustc --version
          cargo --version

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.15.0

      - name: Format Rust working tree and capture patch
        shell: bash
        run: |
          cargo fmt --all
          git diff -- crates/core > rustfmt.patch

      - name: Rust lint
        run: npm run lint:rust

      - name: Unit and contract tests
        run: npm test

      - name: Production build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Verify generated WASM and package layout
        shell: bash
        run: |
          test -s packages/engine/dist/wasm/audio_game_core_bg.wasm
          test -s packages/engine/dist/wasm/audio_game_core.js
          test -s demo/dist/engine/wasm/audio_game_core_bg.wasm
          npm run test:wasm
          echo "WASM bytes: $(wc -c < packages/engine/dist/wasm/audio_game_core_bg.wasm)"
          echo "Engine package bytes: $(du -sb packages/engine/dist | cut -f1)"

      - name: Install browser runtimes
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Browser smoke tests
        run: npm run test:e2e

      - name: Require committed Rust formatting
        if: always()
        shell: bash
        run: |
          if [[ -s rustfmt.patch ]]; then
            cat rustfmt.patch
            echo "Rust formatter changed tracked files. Apply rustfmt.patch and rerun CI."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aaja-audio-demo-${{ github.run_attempt }}
          path: |
            build.log
            demo/dist
            packages/engine/dist
            playwright-report
            test-results
            rustfmt.patch
          if-no-files-found: warn
          retention-days: 7
