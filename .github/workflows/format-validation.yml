name: Format validation branch

on:
  pull_request:
    paths:
      - "crates/core/**/*.rs"
      - ".github/workflows/format-validation.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rustfmt-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rustfmt:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Configure stable rustfmt
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update --component rustfmt
          rustup default stable

      - name: Format Rust sources
        run: cargo fmt --all

      - name: Commit formatting when needed
        shell: bash
        run: |
          if git diff --quiet -- crates/core; then
            echo "Rust sources are already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/core
          git commit -m "style: apply rustfmt"
          git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
