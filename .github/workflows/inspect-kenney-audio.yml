name: Export Kenney real-world audio references

on:
  pull_request:
    paths:
      - ".github/workflows/inspect-kenney-audio.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install audio tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null || ! command -v ffprobe >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Download CC0 Kenney audio packs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p candidates/rpg candidates/impact
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/rpg-audio/8e99002d76-1677590336/kenney_rpg-audio.zip" \
            -o rpg.zip
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/impact-sounds/87b4ddecda-1677589768/kenney_impact-sounds.zip" \
            -o impact.zip
          unzip -q rpg.zip -d candidates/rpg
          unzip -q impact.zip -d candidates/impact

      - name: Convert one door and one wooden footstep to iPhone-safe WAV
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p selected
          door="$(find candidates/rpg -type f -name 'doorClose_2.ogg' -print -quit)"
          step="$(find candidates/impact -type f -name 'footstep_wood_000.ogg' -print -quit)"
          test -n "$door"
          test -n "$step"
          ffmpeg -v error -y -i "$door" -ac 1 -ar 48000 -c:a pcm_s16le selected/door-close.wav
          ffmpeg -v error -y -i "$step" -ac 1 -ar 48000 -c:a pcm_s16le selected/wood-step.wav
          cp "$(find candidates/rpg -type f -iname 'License.txt' -print -quit)" selected/KENNEY_RPG_AUDIO_LICENSE.txt
          cp "$(find candidates/impact -type f -iname 'License.txt' -print -quit)" selected/KENNEY_IMPACT_SOUNDS_LICENSE.txt

      - name: Validate exported audio
        shell: bash
        run: |
          set -euo pipefail
          for file in selected/door-close.wav selected/wood-step.wav; do
            test "$(head -c 4 "$file")" = "RIFF"
            duration="$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$file")"
            test -n "$duration"
            echo "$file duration=$duration"
          done

      - name: Upload reference sounds
        uses: actions/upload-artifact@v4
        with:
          name: kenney-real-audio-references
          path: selected
          if-no-files-found: error
