name: Inspect Kenney real-world audio candidates

on:
  pull_request:
    paths:
      - ".github/workflows/inspect-kenney-audio.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install audio tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null || ! command -v ffprobe >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Download CC0 Kenney audio packs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p candidates/rpg candidates/impact
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/rpg-audio/8e99002d76-1677590336/kenney_rpg-audio.zip" \
            -o rpg.zip
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/impact-sounds/87b4ddecda-1677589768/kenney_impact-sounds.zip" \
            -o impact.zip
          unzip -q rpg.zip -d candidates/rpg
          unzip -q impact.zip -d candidates/impact

      - name: Convert doors and wooden footsteps to iPhone-safe WAV
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p selected/door selected/steps

          find candidates/rpg/Audio -maxdepth 1 -type f -name 'doorClose_*.ogg' -print0 \
            | sort -z \
            | while IFS= read -r -d '' source; do
                name="$(basename "${source%.ogg}")"
                ffmpeg -v error -y -i "$source" -ac 1 -ar 48000 -c:a pcm_s16le "selected/door/${name}.wav"
              done

          find candidates/impact/Audio -maxdepth 1 -type f -name 'footstep_wood_*.ogg' -print0 \
            | sort -z \
            | while IFS= read -r -d '' source; do
                name="$(basename "${source%.ogg}")"
                ffmpeg -v error -y -i "$source" -ac 1 -ar 48000 -c:a pcm_s16le "selected/steps/${name}.wav"
              done

          test "$(find selected/door -type f -name '*.wav' | wc -l)" -eq 4
          test "$(find selected/steps -type f -name '*.wav' | wc -l)" -eq 5
          cp candidates/rpg/License.txt selected/KENNEY_RPG_AUDIO_LICENSE.txt
          cp candidates/impact/License.txt selected/KENNEY_IMPACT_SOUNDS_LICENSE.txt

      - name: Record duration, loudness and peak
        shell: bash
        run: |
          set -euo pipefail
          {
            echo -e "duration_seconds\tpeak_db\tmean_volume_db\tfile"
            while IFS= read -r file; do
              duration="$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$file")"
              stats="$(ffmpeg -hide_banner -i "$file" -af volumedetect -f null - 2>&1)"
              peak="$(sed -n 's/.*max_volume: \([^ ]*\) dB.*/\1/p' <<<"$stats" | tail -n 1)"
              mean="$(sed -n 's/.*mean_volume: \([^ ]*\) dB.*/\1/p' <<<"$stats" | tail -n 1)"
              printf '%s\t%s\t%s\t%s\n' "$duration" "$peak" "$mean" "$file"
            done < <(find selected -type f -name '*.wav' | sort)
          } | tee selected/manifest.tsv

      - name: Upload exact candidates
        uses: actions/upload-artifact@v4
        with:
          name: kenney-real-audio-candidates
          path: selected
          if-no-files-found: error
