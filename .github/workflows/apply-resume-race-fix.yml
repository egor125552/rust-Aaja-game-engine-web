name: Apply resume cancellation fix

on:
  push:
    branches:
      - feature/full-listening-tour
    paths:
      - .github/workflows/apply-resume-race-fix.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/full-listening-tour

      - name: Guard pending source starts after AudioContext resume
        shell: python
        run: |
          from pathlib import Path

          path = Path("packages/engine/src/source.ts")
          source = path.read_text()
          needle = """    await this.host.resume();
              const targetVolume = this.currentVolume;
          """
          buffer_replacement = """    await this.host.resume();
              // A pending browser unlock may settle after the source was cancelled.
              // Treat disposal during resume as a clean cancellation, not a late start.
              if (this.isDisposed) return;
              const targetVolume = this.currentVolume;
          """
          stream_replacement = """    await this.host.resume();
              // A pending browser unlock may settle after the source was cancelled.
              if (this.isDisposed) return;
              const targetVolume = this.currentVolume;
          """
          if source.count(needle) != 2:
              raise SystemExit(f"Expected two resume sites, found {source.count(needle)}")
          source = source.replace(needle, buffer_replacement, 1)
          source = source.replace(needle, stream_replacement, 1)
          path.write_text(source)

      - name: Verify TypeScript and remove helper workflow
        shell: bash
        run: |
          npm ci
          npm run test:ts
          rm .github/workflows/apply-resume-race-fix.yml

      - name: Commit the focused fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/engine/src/source.ts .github/workflows/apply-resume-race-fix.yml
          git commit -m "fix: cancel source start disposed during resume"
          git push origin HEAD:feature/full-listening-tour
