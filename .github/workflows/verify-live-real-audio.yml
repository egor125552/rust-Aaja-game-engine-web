name: Verify live real audio listening lab

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for updated GitHub Pages resources
        shell: bash
        run: |
          set -euo pipefail
          base="https://egor125552.github.io/rust-Aaja-game-engine-web"
          for attempt in {1..36}; do
            if html="$(curl --fail --silent --show-error --location "$base/")" \
              && grep -q 'id="sample-source"' <<<"$html" \
              && curl --fail --silent --show-error --location "$base/assets/audio/door-close.wav" -o door-close.wav \
              && curl --fail --silent --show-error --location "$base/assets/audio/wood-footsteps-loop.wav" -o wood-footsteps-loop.wav \
              && [[ "$(head -c 4 door-close.wav)" == "RIFF" ]] \
              && [[ "$(head -c 4 wood-footsteps-loop.wav)" == "RIFF" ]]; then
              echo "Updated Pages resources are live."
              exit 0
            fi
            sleep 5
          done
          echo "Updated Pages resources did not become available."
          exit 1

      - name: Install WebKit runtime
        run: npx playwright install --with-deps webkit

      - name: Select, fetch, decode, and play the real door in WebKit
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { webkit } from "@playwright/test";

          const browser = await webkit.launch();
          const page = await browser.newPage();
          const errors = [];
          page.on("pageerror", (error) => errors.push(error.message));
          page.on("console", (message) => {
            if (message.type() === "error") errors.push(message.text());
          });

          await page.goto("https://egor125552.github.io/rust-Aaja-game-engine-web/", { waitUntil: "networkidle" });
          await page.getByLabel("Тестовый звук").selectOption("door");
          await page.getByRole("button", { name: "Включить звук" }).click();
          await page.locator("#core-version").waitFor({ state: "visible" });
          await page.getByRole("button", { name: "Спереди — 2" }).click();
          await page.locator("#status").filter({ hasText: "закрытие двери" }).waitFor();

          const coreVersion = (await page.locator("#core-version").textContent())?.trim();
          if (!coreVersion || coreVersion === "не загружено") throw new Error("Rust/WASM core did not initialize");
          if (errors.length) throw new Error(`Public WebKit errors: ${errors.join(" | ")}`);
          console.log(`Live WebKit verification passed with core ${coreVersion}`);
          await browser.close();
          NODE
