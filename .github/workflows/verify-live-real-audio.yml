name: Verify live real audio listening lab

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for updated GitHub Pages resources
        shell: bash
        run: |
          set -euo pipefail
          base="https://egor125552.github.io/rust-Aaja-game-engine-web"
          for attempt in {1..48}; do
            stamp="$(date +%s%N)"
            if html="$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$base/?verify=$stamp")" \
              && grep -q 'id="sample-source"' <<<"$html" \
              && main="$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$base/src/main.js?verify=$stamp")" \
              && grep -q 'sample-library.js' <<<"$main" \
              && tour="$(curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$base/src/feature-tour-ui.js?verify=$stamp")" \
              && grep -q 'getSelectedSampleUrl' <<<"$tour" \
              && curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$base/assets/audio/door-close.wav?verify=$stamp" -o door-close.wav \
              && curl --fail --silent --show-error --location -H 'Cache-Control: no-cache' "$base/assets/audio/wood-footsteps-loop.wav?verify=$stamp" -o wood-footsteps-loop.wav \
              && [[ "$(head -c 4 door-close.wav)" == "RIFF" ]] \
              && [[ "$(head -c 4 wood-footsteps-loop.wav)" == "RIFF" ]]; then
              echo "Updated HTML, JavaScript, and WAV resources are live."
              exit 0
            fi
            sleep 5
          done
          echo "Updated Pages resources did not become available."
          exit 1

      - name: Install WebKit runtime
        run: npx playwright install --with-deps webkit

      - name: Select, fetch, decode, and play the real door in WebKit
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { webkit } from "@playwright/test";

          const browser = await webkit.launch();
          const context = await browser.newContext({
            extraHTTPHeaders: { "Cache-Control": "no-cache", Pragma: "no-cache" },
          });
          const page = await context.newPage();
          const errors = [];
          page.on("pageerror", (error) => errors.push(error.message));
          page.on("console", (message) => {
            if (message.type() === "error") errors.push(message.text());
          });

          const stamp = Date.now();
          await page.goto(`https://egor125552.github.io/rust-Aaja-game-engine-web/?verify=${stamp}`, {
            waitUntil: "networkidle",
          });
          await page.getByLabel("Тестовый звук").selectOption("door");
          await page.getByRole("button", { name: "Включить звук" }).click();
          await page.waitForFunction(() => {
            const value = document.querySelector("#core-version")?.textContent?.trim();
            return Boolean(value && value !== "не загружено");
          });

          const doorRequest = page.waitForResponse((response) => (
            response.url().includes("/assets/audio/door-close.wav") && response.status() === 200
          ));
          await page.getByRole("button", { name: "Спереди — 2" }).click();
          await doorRequest;
          await page.waitForFunction(() => (
            document.querySelector("#status")?.textContent?.includes("закрытие двери")
          ));

          const coreVersion = (await page.locator("#core-version").textContent())?.trim();
          if (errors.length) throw new Error(`Public WebKit errors: ${errors.join(" | ")}`);
          console.log(`Live WebKit verification passed with core ${coreVersion}`);
          await browser.close();
          NODE
