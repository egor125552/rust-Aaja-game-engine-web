name: Finalize real audio listening lab

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.head.ref == 'feature/real-world-audio-tests')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fixed same-repository feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/real-world-audio-tests
          fetch-depth: 0

      - name: Apply deterministic finalizer
        run: python3 scripts/finalize-real-audio-lab.py

      - name: Commit finalized lab
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git add -f demo/assets/audio
          if git diff --cached --quiet; then
            echo "Real-audio listening lab is already finalized."
            exit 0
          fi
          git commit -m "Use real Foley sounds in listening lab"
          git fetch origin feature/real-world-audio-tests
          git rebase origin/feature/real-world-audio-tests
          git push origin HEAD:feature/real-world-audio-tests
