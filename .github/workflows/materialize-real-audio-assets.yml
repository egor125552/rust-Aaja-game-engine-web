name: Materialize real audio assets

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.head.ref == 'feature/real-world-audio-tests')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fixed same-repository feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/real-world-audio-tests
          fetch-depth: 0

      - name: Install audio tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Download and convert real Foley
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .audio-work
          mkdir -p .audio-work/rpg .audio-work/impact .audio-work/loop demo/assets/audio
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/rpg-audio/8e99002d76-1677590336/kenney_rpg-audio.zip" \
            -o .audio-work/rpg.zip
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/impact-sounds/87b4ddecda-1677589768/kenney_impact-sounds.zip" \
            -o .audio-work/impact.zip
          unzip -q .audio-work/rpg.zip -d .audio-work/rpg
          unzip -q .audio-work/impact.zip -d .audio-work/impact

          door="$(find .audio-work/rpg -type f -name 'doorClose_2.ogg' -print -quit)"
          step="$(find .audio-work/impact -type f -name 'footstep_wood_000.ogg' -print -quit)"
          rpg_license="$(find .audio-work/rpg -type f -iname 'License.txt' -print -quit)"
          impact_license="$(find .audio-work/impact -type f -iname 'License.txt' -print -quit)"
          test -n "$door" && test -n "$step" && test -n "$rpg_license" && test -n "$impact_license"

          ffmpeg -v error -y -i "$door" -ac 1 -ar 48000 -c:a pcm_s16le demo/assets/audio/door-close.wav
          ffmpeg -v error -y -i "$step" -ac 1 -ar 48000 -c:a pcm_s16le .audio-work/loop/step.wav
          ffmpeg -v error -y -f lavfi -i anullsrc=r=48000:cl=mono -t 0.48 -c:a pcm_s16le .audio-work/loop/pause.wav
          ffmpeg -v error -y -f lavfi -i anullsrc=r=48000:cl=mono -t 0.70 -c:a pcm_s16le .audio-work/loop/pause-long.wav
          cat > .audio-work/loop/concat.txt <<'EOF'
          file 'step.wav'
          file 'pause.wav'
          file 'step.wav'
          file 'pause-long.wav'
          EOF
          ffmpeg -v error -y -f concat -safe 0 -i .audio-work/loop/concat.txt \
            -ac 1 -ar 48000 -c:a pcm_s16le demo/assets/audio/wood-footsteps-loop.wav

          cp "$rpg_license" demo/assets/audio/KENNEY_RPG_AUDIO_LICENSE.txt
          cp "$impact_license" demo/assets/audio/KENNEY_IMPACT_SOUNDS_LICENSE.txt
          for file in demo/assets/audio/*.wav; do
            test "$(head -c 4 "$file")" = "RIFF"
            test "$(dd if="$file" bs=1 skip=8 count=4 status=none)" = "WAVE"
          done

      - name: Finalize accessible listening lab
        run: python3 scripts/finalize-real-audio-lab.py

      - name: Commit finalized lab to feature branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .audio-work
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -f demo/assets/audio
          if git diff --cached --quiet; then
            echo "Real-audio listening lab is already finalized."
            exit 0
          fi
          git commit -m "Use real Foley sounds in listening lab"
          git fetch origin feature/real-world-audio-tests
          git rebase origin/feature/real-world-audio-tests
          git push origin HEAD:feature/real-world-audio-tests
