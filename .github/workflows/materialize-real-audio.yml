name: Materialize real CC0 audio lab

on:
  pull_request:
    paths:
      - ".github/workflows/materialize-real-audio.yml"

permissions:
  contents: write

jobs:
  materialize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/real-world-audio-tests
          fetch-depth: 0

      - name: Install audio tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null || ! command -v ffprobe >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Download and convert CC0 Foley
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .audio-work
          mkdir -p .audio-work/rpg .audio-work/impact .audio-work/steps demo/assets/audio
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/rpg-audio/8e99002d76-1677590336/kenney_rpg-audio.zip" \
            -o .audio-work/rpg.zip
          curl --fail --location --retry 3 \
            "https://kenney.nl/media/pages/assets/impact-sounds/87b4ddecda-1677589768/kenney_impact-sounds.zip" \
            -o .audio-work/impact.zip
          unzip -q .audio-work/rpg.zip -d .audio-work/rpg
          unzip -q .audio-work/impact.zip -d .audio-work/impact

          for number in 1 2 3 4; do
            ffmpeg -v error -y \
              -i ".audio-work/rpg/Audio/doorClose_${number}.ogg" \
              -ac 1 -ar 48000 -c:a pcm_s16le \
              "demo/assets/audio/door-close-${number}.wav"
          done

          for number in 000 001 002 003 004; do
            ffmpeg -v error -y \
              -i ".audio-work/impact/Audio/footstep_wood_${number}.ogg" \
              -ac 1 -ar 48000 -c:a pcm_s16le \
              ".audio-work/steps/step-${number}.wav"
          done

          ffmpeg -v error -y -f lavfi -i anullsrc=r=48000:cl=mono -t 0.28 \
            -c:a pcm_s16le .audio-work/steps/pause-short.wav
          ffmpeg -v error -y -f lavfi -i anullsrc=r=48000:cl=mono -t 0.62 \
            -c:a pcm_s16le .audio-work/steps/pause-long.wav

          cat > .audio-work/steps/concat.txt <<'EOF'
          file 'step-000.wav'
          file 'pause-short.wav'
          file 'step-001.wav'
          file 'pause-short.wav'
          file 'step-002.wav'
          file 'pause-short.wav'
          file 'step-003.wav'
          file 'pause-short.wav'
          file 'step-004.wav'
          file 'pause-long.wav'
          EOF
          ffmpeg -v error -y -f concat -safe 0 -i .audio-work/steps/concat.txt \
            -ac 1 -ar 48000 -c:a pcm_s16le demo/assets/audio/wood-footsteps-loop.wav

          for file in demo/assets/audio/*.wav; do
            test "$(head -c 4 "$file")" = "RIFF"
            test "$(dd if="$file" bs=1 skip=8 count=4 status=none)" = "WAVE"
          done

      - name: Add sample library and documentation
        shell: bash
        run: |
          set -euo pipefail
          cat > demo/src/sample-library.js <<'EOF'
          import { createTestEarconUrl, revokeTestEarconUrl } from "./test-earcon.js";

          const SOUND_URLS = Object.freeze({
            steps: "assets/audio/wood-footsteps-loop.wav",
            "door-1": "assets/audio/door-close-1.wav",
            "door-2": "assets/audio/door-close-2.wav",
            "door-3": "assets/audio/door-close-3.wav",
            "door-4": "assets/audio/door-close-4.wav",
          });

          const SOUND_LABELS = Object.freeze({
            steps: "реальные деревянные шаги",
            "door-1": "закрытие двери, вариант 1",
            "door-2": "закрытие двери, вариант 2",
            "door-3": "закрытие двери, вариант 3",
            "door-4": "закрытие двери, вариант 4",
            synthetic: "синтетический контрольный earcon",
          });

          function selectedMode() {
            const element = document.getElementById("sample-source");
            return element instanceof HTMLSelectElement ? element.value : "real-mix";
          }

          export function getSelectedSampleUrl(kind = "movement") {
            const mode = selectedMode();
            if (mode === "synthetic") return createTestEarconUrl();
            if (mode === "real-mix") return kind === "transient" ? SOUND_URLS["door-2"] : SOUND_URLS.steps;
            return SOUND_URLS[mode] ?? SOUND_URLS.steps;
          }

          export function getSelectedSampleLabel(kind = "movement") {
            const mode = selectedMode();
            if (mode === "real-mix") {
              return kind === "transient"
                ? "реальное закрытие двери"
                : "реальный цикл деревянных шагов";
            }
            return SOUND_LABELS[mode] ?? SOUND_LABELS.steps;
          }

          export function getSelectedSampleSummary() {
            const mode = selectedMode();
            if (mode === "real-mix") {
              return "Автоматический режим: дверь для коротких импульсов, деревянные шаги для движения и циклов.";
            }
            return `Все сценарии используют: ${SOUND_LABELS[mode] ?? SOUND_LABELS.steps}.`;
          }

          export function releaseSampleLibrary() {
            revokeTestEarconUrl();
          }
          EOF

          mkdir -p docs
          cat > docs/audio-assets.md <<'EOF'
          # Real-world audio assets

          The listening lab uses real Foley from two Kenney packs:

          - **RPG Audio**: four door-close recordings.
          - **Impact Sounds**: five wooden-footstep recordings combined into a loop-friendly sequence.

          Both source packs are published by Kenney under **Creative Commons CC0 1.0**. The demo vendors PCM WAV derivatives at 48 kHz mono so iPhone Safari does not depend on Ogg decoding support.

          Source pages:

          - https://kenney.nl/assets/rpg-audio
          - https://kenney.nl/assets/impact-sounds
          - https://creativecommons.org/publicdomain/zero/1.0/

          Processing is deliberately minimal: decode, mono conversion, 48 kHz resampling, PCM16 output, and silence inserted between unmodified wooden footsteps. No synthetic layer is mixed into the real recordings.
          EOF

      - name: Patch demo and scenarios
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:80]!r}")
              p.write_text(text.replace(old, new, 1))

          replace_once(
              "demo/src/feature-tour-ui.js",
              'import { createTestEarconUrl, revokeTestEarconUrl } from "./test-earcon.js";\n',
              'import {\n  getSelectedSampleLabel,\n  getSelectedSampleSummary,\n  getSelectedSampleUrl,\n  releaseSampleLibrary,\n} from "./sample-library.js";\n',
          )
          replace_once(
              "demo/src/feature-tour-ui.js",
              'const section = byId("feature-tour");\nlet engine;\n',
              'const section = byId("feature-tour");\nconst sampleSelect = byId("sample-source");\nconst sampleDescription = byId("sample-description");\nlet engine;\n',
          )
          replace_once(
              "demo/src/feature-tour-ui.js",
              '  createSampleUrl: createTestEarconUrl,\n',
              '  createSampleUrl: getSelectedSampleUrl,\n',
          )
          replace_once(
              "demo/src/feature-tour-ui.js",
              'levelSelect.addEventListener("change", updateDescription);\n',
              '''function updateSampleDescription() {
  sampleDescription.textContent = getSelectedSampleSummary();
}

sampleSelect.addEventListener("change", () => {
  updateSampleDescription();
  announce(`Тестовый звук изменён: ${getSelectedSampleLabel("movement")}.`);
});
levelSelect.addEventListener("change", updateDescription);
''',
          )
          replace_once(
              "demo/src/feature-tour-ui.js",
              'window.addEventListener("beforeunload", revokeTestEarconUrl);\nupdateDescription();\n',
              'window.addEventListener("beforeunload", releaseSampleLibrary);\nupdateSampleDescription();\nupdateDescription();\n',
          )

          replace_once(
              "demo/src/feature-tour.js",
              '''  const playSample = async (audio, options = {}) => track(await audio.play(createSampleUrl(), {
    position: [0, 0, -3],
    category: "ui",
    priority: 60,
    roomAmount: 0.8,
    ...options,
  }));
''',
              '''  const playSample = async (audio, options = {}) => {
    const { sampleKind = "movement", ...sourceOptions } = options;
    return track(await audio.play(createSampleUrl(sampleKind), {
      position: [0, 0, -3],
      category: "ui",
      priority: 60,
      roomAmount: 0.8,
      ...sourceOptions,
    }));
  };
''',
          )
          replace_once(
              "demo/src/feature-tour.js",
              'const source = await playSample(audio, { position, roomAmount: 0.25 });',
              'const source = await playSample(audio, { position, roomAmount: 0.25, sampleKind: "transient" });',
          )
          replace_once(
              "demo/src/feature-tour.js",
              'let source = await playSample(audio, { position: [0, 0, 4], roomAmount: 0.2 });',
              'let source = await playSample(audio, { position: [0, 0, 4], roomAmount: 0.2, sampleKind: "transient" });',
          )
          replace_once(
              "demo/src/feature-tour.js",
              'source = await playSample(audio, { position: [0, 0, 4], roomAmount: 0.2 });',
              'source = await playSample(audio, { position: [0, 0, 4], roomAmount: 0.2, sampleKind: "transient" });',
          )
          replace_once(
              "demo/src/feature-tour.js",
              '''      const source = await playSample(audio, {
        position: [0, 0, -2.5],
        roomAmount: room === "dry" ? 0 : 1,
        volume: 0.72,
      });
''',
              '''      const source = await playSample(audio, {
        position: [0, 0, -2.5],
        roomAmount: room === "dry" ? 0 : 1,
        volume: 0.72,
        sampleKind: "transient",
      });
''',
          )

          replace_once(
              "demo/src/main.js",
              'import { AudioGameEngine } from "@aaja/audio-game-engine";\n',
              'import { AudioGameEngine } from "@aaja/audio-game-engine";\nimport { getSelectedSampleLabel, getSelectedSampleUrl, releaseSampleLibrary } from "./sample-library.js";\n',
          )
          replace_once(
              "demo/src/main.js",
              '''  const source = await audio.playTone({
    frequency: directionNotes[name],
    durationMs: 520,
    type: "sine",
    position: directionPosition(name, 4),
    category: "danger",
    priority: 100,
    occlusion: occlusionValues[occlusionIndex],
    roomAmount: 0.65,
  });
  disposeLater(source, 800);
  if (shouldAnnounce) announce(`Короткий источник ${directionLabels[name]}.`);
''',
              '''  const source = await audio.play(getSelectedSampleUrl("transient"), {
    position: directionPosition(name, 4),
    category: "danger",
    priority: 100,
    occlusion: occlusionValues[occlusionIndex],
    roomAmount: 0.65,
    volume: 0.9,
  });
  disposeLater(source, 1_600);
  if (shouldAnnounce) announce(`Источник ${directionLabels[name]}: ${getSelectedSampleLabel("transient")}.`);
''',
          )
          replace_once(
              "demo/src/main.js",
              '''  const source = await audio.playTone({
    frequency: 340,
    durationMs: 900,
    type: "triangle",
    position: directionPosition("front", 12),
    loop: true,
    volume: 0.7,
    category: "mechanisms",
    occlusion: occlusionValues[occlusionIndex],
  });
''',
              '''  const source = await audio.play(getSelectedSampleUrl("movement"), {
    position: directionPosition("front", 12),
    loop: true,
    volume: 0.7,
    category: "mechanisms",
    occlusion: occlusionValues[occlusionIndex],
  });
''',
          )
          replace_once(
              "demo/src/main.js",
              '''  beacon = await audio.playTone({
    frequency: 760,
    durationMs: 700,
    type: "sine",
    position: directionPosition("front"),
    loop: true,
    volume: 0.55,
    category: "environment",
    priority: 55,
    occlusion: occlusionValues[occlusionIndex],
    roomAmount: 0.85,
  });
''',
              '''  beacon = await audio.play(getSelectedSampleUrl("movement"), {
    position: directionPosition("front"),
    loop: true,
    volume: 0.55,
    category: "environment",
    priority: 55,
    occlusion: occlusionValues[occlusionIndex],
    roomAmount: 0.85,
  });
''',
          )
          replace_once(
              "demo/src/main.js",
              '''  const sources = await Promise.all(positions.map(([x, z], index) => audio.playTone({
    frequency: 300 + index * 85,
    durationMs: 1_100,
    type: index % 2 === 0 ? "sine" : "triangle",
    position: worldPosition(x, z),
    volume: 0.28,
    category: index === 5 ? "danger" : "environment",
    priority: index === 5 ? 100 : 25,
    roomAmount: 0.55,
  })));
''',
              '''  const sources = await Promise.all(positions.map(([x, z], index) => audio.play(getSelectedSampleUrl("movement"), {
    loop: true,
    playbackRate: 0.88 + index * 0.045,
    position: worldPosition(x, z),
    volume: 0.24,
    category: index === 5 ? "danger" : "environment",
    priority: index === 5 ? 100 : 25,
    roomAmount: 0.55,
  })));
''',
          )
          replace_once(
              "demo/src/main.js",
              '  const source = await audio.play(createWavUrl(), {\n',
              '  const source = await audio.play(getSelectedSampleUrl("transient"), {\n',
          )
          replace_once(
              "demo/src/main.js",
              '  announce("WAV-файл загружен через fetch, декодирован браузером и воспроизведён справа.");\n',
              '  announce(`Реальный WAV загружен и декодирован справа: ${getSelectedSampleLabel("transient")}.`);\n',
          )
          replace_once(
              "demo/src/main.js",
              '  if (generatedWavUrl) URL.revokeObjectURL(generatedWavUrl);\n  void engine?.close();\n',
              '  if (generatedWavUrl) URL.revokeObjectURL(generatedWavUrl);\n  releaseSampleLibrary();\n  void engine?.close();\n',
          )

          replace_once(
              "demo/index.html",
              '''      <p>
        Выбери отдельный уровень или полный прогон. Каждый уровень использует один и тот же
        локально сгенерированный WAV-earcon, поэтому различия создаёт именно движок, а не разные записи.
        Рецепт звука основан на принципах открытого набора BeepBank-500, где аудио опубликовано как CC0.
      </p>
      <p>
        <label for="tour-level">Уровень проверки</label>
''',
              '''      <p>
        По умолчанию стенд использует настоящие CC0-записи: закрытие деревянной двери для коротких
        импульсов и цикл деревянных шагов для движения. Можно выбрать один конкретный звук или
        синтетический контрольный сигнал и повторить тот же тест.
      </p>
      <p>
        <label for="sample-source">Тестовый звук</label>
        <select id="sample-source">
          <option value="real-mix">Автоматически: дверь и деревянные шаги</option>
          <option value="steps">Только деревянные шаги</option>
          <option value="door-1">Закрытие двери — вариант 1</option>
          <option value="door-2">Закрытие двери — вариант 2</option>
          <option value="door-3">Закрытие двери — вариант 3</option>
          <option value="door-4">Закрытие двери — вариант 4</option>
          <option value="synthetic">Синтетический контрольный earcon</option>
        </select>
      </p>
      <p id="sample-description">Автоматический режим: дверь для импульсов, шаги для движения.</p>
      <p>
        <label for="tour-level">Уровень проверки</label>
''',
          )
          replace_once(
              "demo/index.html",
              '<button id="loaded-file" aria-keyshortcuts="L">Загрузить и декодировать WAV — L</button>',
              '<button id="loaded-file" aria-keyshortcuts="L">Воспроизвести выбранный реальный WAV — L</button>',
          )

          replace_once(
              "scripts/copy-demo.mjs",
              'await cp("demo/src", "demo/dist/src", { recursive: true });\n',
              'await cp("demo/src", "demo/dist/src", { recursive: true });\nawait cp("demo/assets", "demo/dist/assets", { recursive: true });\n',
          )
          replace_once(
              "package.json",
              'node --check demo/src/test-earcon.js && node --check demo/src/feature-tour-ui.js',
              'node --check demo/src/test-earcon.js && node --check demo/src/sample-library.js && node --check demo/src/feature-tour-ui.js',
          )
          PY

      - name: Add WAV contract tests and changelog
        shell: bash
        run: |
          set -euo pipefail
          cat > tests/real-audio.test.mjs <<'EOF'
          import assert from "node:assert/strict";
          import { readFile } from "node:fs/promises";
          import test from "node:test";

          const files = [
            "demo/assets/audio/door-close-1.wav",
            "demo/assets/audio/door-close-2.wav",
            "demo/assets/audio/door-close-3.wav",
            "demo/assets/audio/door-close-4.wav",
            "demo/assets/audio/wood-footsteps-loop.wav",
          ];

          function wavInfo(buffer) {
            assert.equal(buffer.toString("ascii", 0, 4), "RIFF");
            assert.equal(buffer.toString("ascii", 8, 12), "WAVE");
            assert.equal(buffer.readUInt16LE(22), 1, "audio must be mono");
            assert.equal(buffer.readUInt32LE(24), 48_000, "audio must be 48 kHz");
            assert.equal(buffer.readUInt16LE(34), 16, "audio must be PCM16");
            let offset = 12;
            while (offset + 8 <= buffer.length) {
              const id = buffer.toString("ascii", offset, offset + 4);
              const size = buffer.readUInt32LE(offset + 4);
              if (id === "data") {
                return { duration: size / (48_000 * 2), dataSize: size };
              }
              offset += 8 + size + (size % 2);
            }
            throw new Error("WAV data chunk was not found");
          }

          test("real Foley WAV assets are valid and useful", async () => {
            for (const file of files) {
              const info = wavInfo(await readFile(file));
              assert.ok(info.dataSize > 1_000, `${file} must contain audio data`);
              assert.ok(info.duration > 0.08, `${file} is unexpectedly short`);
              assert.ok(info.duration < 8, `${file} is unexpectedly long`);
            }
          });
          EOF

          cat >> CHANGELOG.md <<'EOF'

          - Replaced the generated earcon as the listening lab default with real CC0 door and wooden-footstep Foley from Kenney.
          - Added a screen-reader-accessible source selector, four door variants, a loop-friendly wooden-step sequence, and a retained synthetic control signal.
          - Converted vendored demo audio to mono 48 kHz PCM16 WAV for dependable iPhone Safari decoding.
          EOF

      - name: Verify generated tree
        shell: bash
        run: |
          set -euo pipefail
          node --check demo/src/main.js
          node --check demo/src/feature-tour.js
          node --check demo/src/feature-tour-ui.js
          node --check demo/src/sample-library.js
          node --check tests/real-audio.test.mjs
          node --test tests/real-audio.test.mjs
          grep -q 'sample-source' demo/index.html
          grep -q 'sampleKind: "transient"' demo/src/feature-tour.js
          test -s demo/assets/audio/door-close-2.wav
          test -s demo/assets/audio/wood-footsteps-loop.wav

      - name: Commit generated audio lab
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .audio-work
          git rm .github/workflows/materialize-real-audio.yml .github/workflows/inspect-kenney-audio.yml
          git add -f demo/assets/audio/*.wav
          git add demo/src/sample-library.js demo/src/main.js demo/src/feature-tour.js demo/src/feature-tour-ui.js
          git add demo/index.html scripts/copy-demo.mjs package.json tests/real-audio.test.mjs docs/audio-assets.md CHANGELOG.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "demo: use real CC0 door and footstep audio"
          git push origin HEAD:feature/real-world-audio-tests
