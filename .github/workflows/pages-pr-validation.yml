name: Publish and verify public listening lab

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "public-site-publish"
  cancel-in-progress: true

jobs:
  build-publish-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure stable Rust
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.15.0

      - name: Build production demo
        run: npm run build

      - name: Publish static site branch including WASM
        id: publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -s demo/dist/engine/wasm/audio_game_core_bg.wasm
          cd demo/dist
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b public-site
          git add --all --force
          git commit -m "Publish listening lab from ${GITHUB_SHA}"
          site_sha="$(git rev-parse HEAD)"
          git ls-files engine/wasm/audio_game_core_bg.wasm | grep -q .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin public-site
          echo "site_sha=${site_sha}" >> "$GITHUB_OUTPUT"
          echo "url=https://rawcdn.githack.com/${GITHUB_REPOSITORY}/${site_sha}/index.html" >> "$GITHUB_OUTPUT"

      - name: Verify public Safari resources
        shell: bash
        run: |
          set -euo pipefail
          url="${{ steps.publish.outputs.url }}"
          base="${url%/index.html}"
          for attempt in {1..36}; do
            if html="$(curl --fail --silent --show-error --location "$url")"; then
              grep -q "Aaja Audio Game Engine" <<<"$html"
              curl --fail --silent --show-error --location "$base/src/feature-tour-ui.js" -o feature-tour-ui.js
              curl --fail --silent --show-error --location "$base/engine/index.js" -o engine.js
              curl --fail --silent --show-error --location "$base/engine/wasm/audio_game_core_bg.wasm" -o core.wasm
              test -s feature-tour-ui.js
              test -s engine.js
              test -s core.wasm
              printf 'WASM magic: '
              od -An -tx1 -N4 core.wasm
              test "$(od -An -tx1 -N4 core.wasm | tr -d ' \n')" = "0061736d"
              echo "WORKING_URL=$url"
              exit 0
            fi
            sleep 5
          done
          echo "Public site did not become reachable: $url"
          exit 1
