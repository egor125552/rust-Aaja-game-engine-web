name: Verify public listening lab in WebKit

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "public-site-webkit"
  cancel-in-progress: true

jobs:
  webkit-public-url:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install WebKit runtime
        run: npx playwright install --with-deps webkit

      - name: Open public lab in WebKit
        env:
          PUBLIC_URL: https://rawcdn.githack.com/egor125552/rust-Aaja-game-engine-web/10f06a7301a14cae592e9c16c483397f1fc47d68/index.html
        shell: bash
        run: |
          node --input-type=module <<'JS'
          import { webkit } from '@playwright/test';

          const browser = await webkit.launch();
          const page = await browser.newPage();
          const errors = [];
          page.on('pageerror', error => errors.push(`pageerror: ${error.message}`));
          page.on('console', message => {
            if (message.type() === 'error') errors.push(`console: ${message.text()}`);
          });
          page.on('requestfailed', request => {
            errors.push(`request: ${request.url()} — ${request.failure()?.errorText ?? 'failed'}`);
          });

          const response = await page.goto(process.env.PUBLIC_URL, {
            waitUntil: 'networkidle',
            timeout: 60_000,
          });
          if (!response?.ok()) throw new Error(`Navigation failed: ${response?.status()}`);
          await page.getByRole('heading', { name: 'Aaja Audio Game Engine' }).waitFor();
          const enable = page.getByRole('button', { name: 'Включить звук' });
          await enable.waitFor();
          await enable.click();
          await page.waitForFunction(() => {
            const value = document.querySelector('#core-version')?.textContent?.trim();
            return value && value !== 'не загружено';
          }, undefined, { timeout: 30_000 });
          const core = await page.locator('#core-version').innerText();
          const context = await page.locator('#context-state').innerText();
          if (errors.length) throw new Error(errors.join('\n'));
          console.log(`WEBKIT_URL=${process.env.PUBLIC_URL}`);
          console.log(`CORE_VERSION=${core}`);
          console.log(`AUDIO_CONTEXT=${context}`);
          await browser.close();
          JS
