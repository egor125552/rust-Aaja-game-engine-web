name: Validate live GitHub Pages deployment

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-validation"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure stable Rust
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.15.0

      - name: Build production demo
        run: npm run build

      - name: Prevent Jekyll processing
        run: touch demo/dist/.nojekyll

      - name: Configure and enable Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify public page
        shell: bash
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          for attempt in {1..24}; do
            if html="$(curl --fail --silent --show-error --location "$url")"; then
              grep -q "Aaja Audio Game Engine" <<<"$html"
              curl --fail --silent --show-error --location "${url%/}/src/feature-tour-ui.js" >/dev/null
              curl --fail --silent --show-error --location "${url%/}/engine/wasm/audio_game_core_bg.wasm" >/dev/null
              echo "Live page verified: $url"
              exit 0
            fi
            sleep 5
          done
          echo "Published page did not become reachable: $url"
          exit 1