name: Verify public Safari listening lab

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "public-site-verify"
  cancel-in-progress: true

jobs:
  verify-public-site:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Probe public HTML, modules and WASM
        shell: bash
        run: |
          set -u
          repo="egor125552/rust-Aaja-game-engine-web"
          sha="2b5012aab5840258555e89ff9dce27c66ca42753"
          candidates=(
            "https://rawcdn.githack.com/${repo}/${sha}/index.html"
            "https://raw.githack.com/${repo}/public-site/index.html"
            "https://cdn.jsdelivr.net/gh/${repo}@${sha}/index.html"
          )

          for url in "${candidates[@]}"; do
            base="${url%/index.html}"
            echo "--- probing $url"
            if ! curl --fail --silent --show-error --location --max-time 30 -D index.headers "$url" -o index.html; then
              echo "index request failed"
              continue
            fi
            cat index.headers
            if ! grep -q "Aaja Audio Game Engine" index.html; then
              echo "index body is not the listening lab"
              head -c 300 index.html || true
              continue
            fi
            if ! curl --fail --silent --show-error --location --max-time 30 -D js.headers "$base/src/feature-tour-ui.js" -o feature-tour-ui.js; then
              echo "scenario module request failed"
              continue
            fi
            if ! curl --fail --silent --show-error --location --max-time 30 -D engine.headers "$base/engine/index.js" -o engine.js; then
              echo "engine module request failed"
              continue
            fi
            if ! curl --fail --silent --show-error --location --max-time 30 -D wasm.headers "$base/engine/wasm/audio_game_core_bg.wasm" -o core.wasm; then
              echo "WASM request failed"
              continue
            fi
            test -s feature-tour-ui.js
            test -s engine.js
            test -s core.wasm
            echo "HTML headers:"; cat index.headers
            echo "JS headers:"; cat js.headers
            echo "WASM headers:"; cat wasm.headers
            echo "WORKING_URL=$url"
            exit 0
          done

          echo "No public mirror served the complete listening lab."
          exit 1
