name: Verify official GitHub Pages listening lab

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-live-webkit"
  cancel-in-progress: true

jobs:
  verify-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PUBLIC_URL: https://egor125552.github.io/rust-Aaja-game-engine-web/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for published HTML, modules and WASM
        shell: bash
        run: |
          set -euo pipefail
          base="${PUBLIC_URL%/}"
          for attempt in {1..60}; do
            echo "Pages probe $attempt"
            if html="$(curl --fail --silent --show-error --location --max-time 20 "$PUBLIC_URL" 2>/dev/null)" && grep -q "Aaja Audio Game Engine" <<<"$html"; then
              curl --fail --silent --show-error --location --max-time 20 "$base/src/feature-tour-ui.js" -o feature-tour-ui.js
              curl --fail --silent --show-error --location --max-time 20 "$base/engine/index.js" -o engine.js
              curl --fail --silent --show-error --location --max-time 20 "$base/engine/wasm/audio_game_core_bg.wasm" -o core.wasm
              test -s feature-tour-ui.js
              test -s engine.js
              test "$(od -An -tx1 -N4 core.wasm | tr -d ' \n')" = "0061736d"
              echo "GitHub Pages resources are live."
              exit 0
            fi
            sleep 10
          done
          echo "GitHub Pages did not become reachable: $PUBLIC_URL"
          exit 1

      - name: Install WebKit runtime
        run: npx playwright install --with-deps webkit

      - name: Open live page and initialize Rust/WASM in WebKit
        shell: bash
        run: |
          node --input-type=module <<'JS'
          import { webkit } from '@playwright/test';

          const browser = await webkit.launch();
          const page = await browser.newPage();
          const errors = [];
          page.on('pageerror', error => errors.push(`pageerror: ${error.message}`));
          page.on('console', message => {
            if (message.type() === 'error') errors.push(`console: ${message.text()}`);
          });
          page.on('requestfailed', request => errors.push(`request: ${request.url()} — ${request.failure()?.errorText ?? 'failed'}`));

          try {
            const response = await page.goto(process.env.PUBLIC_URL, { waitUntil: 'networkidle', timeout: 60_000 });
            if (!response?.ok()) throw new Error(`Navigation failed: ${response?.status()}`);
            await page.getByRole('heading', { name: 'Aaja Audio Game Engine', exact: true }).waitFor();
            await page.getByRole('button', { name: 'Включить звук' }).click();
            await page.waitForFunction(() => {
              const value = document.querySelector('#core-version')?.textContent?.trim();
              return Boolean(value && value !== 'не загружено');
            }, undefined, { timeout: 30_000 });
            const core = await page.locator('#core-version').innerText();
            const context = await page.locator('#context-state').innerText();
            const status = await page.locator('#status').innerText();
            console.log(`LIVE_URL=${process.env.PUBLIC_URL}`);
            console.log(`CORE_VERSION=${core}`);
            console.log(`AUDIO_CONTEXT=${context}`);
            console.log(`STATUS=${status}`);
            if (errors.length) throw new Error(errors.join('\n'));
          } finally {
            await browser.close();
          }
          JS
