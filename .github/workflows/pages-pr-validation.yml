name: Publish and verify public listening lab

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "public-site-publish"
  cancel-in-progress: true

jobs:
  build-publish-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure stable Rust
        shell: bash
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.15.0

      - name: Build production demo
        run: npm run build

      - name: Publish static site branch
        id: publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd demo/dist
          touch .nojekyll
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b public-site
          git add --all
          git commit -m "Publish listening lab from ${GITHUB_SHA}"
          site_sha="$(git rev-parse HEAD)"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin public-site
          echo "site_sha=${site_sha}" >> "$GITHUB_OUTPUT"
          echo "raw_url=https://raw.githack.com/${GITHUB_REPOSITORY}/${site_sha}/index.html" >> "$GITHUB_OUTPUT"
          echo "cdn_url=https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}@${site_sha}/index.html" >> "$GITHUB_OUTPUT"

      - name: Verify public Safari resources
        shell: bash
        run: |
          set -euo pipefail
          url="${{ steps.publish.outputs.raw_url }}"
          base="${url%/index.html}"
          for attempt in {1..36}; do
            if html="$(curl --fail --silent --show-error --location "$url")"; then
              grep -q "Aaja Audio Game Engine" <<<"$html"
              curl --fail --silent --show-error --location "$base/src/feature-tour-ui.js" >/dev/null
              curl --fail --silent --show-error --location "$base/engine/index.js" >/dev/null
              curl --fail --silent --show-error --location "$base/engine/wasm/audio_game_core_bg.wasm" >/dev/null
              echo "PUBLIC_URL=$url"
              echo "CDN_URL=${{ steps.publish.outputs.cdn_url }}"
              exit 0
            fi
            sleep 5
          done
          echo "Public site did not become reachable: $url"
          exit 1
