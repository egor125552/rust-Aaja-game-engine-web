name: Compare public listening lab mirrors in WebKit

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "public-site-webkit"
  cancel-in-progress: true

jobs:
  webkit-public-url:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install WebKit runtime
        run: npx playwright install --with-deps webkit

      - name: Probe mirrors in WebKit
        shell: bash
        run: |
          set +e
          node --input-type=module >mirror-webkit.log 2>&1 <<'JS'
          import { webkit } from '@playwright/test';

          const urls = [
            'https://rawcdn.githack.com/egor125552/rust-Aaja-game-engine-web/10f06a7301a14cae592e9c16c483397f1fc47d68/index.html',
            'https://raw.githack.com/egor125552/rust-Aaja-game-engine-web/public-site/index.html',
            'https://cdn.jsdelivr.net/gh/egor125552/rust-Aaja-game-engine-web@10f06a7301a14cae592e9c16c483397f1fc47d68/index.html',
          ];

          const browser = await webkit.launch();
          let winner = null;
          try {
            for (const url of urls) {
              const page = await browser.newPage();
              const events = [];
              page.on('pageerror', error => events.push(`pageerror: ${error.message}`));
              page.on('console', message => events.push(`console.${message.type()}: ${message.text()}`));
              page.on('requestfailed', request => events.push(`requestfailed: ${request.url()} — ${request.failure()?.errorText ?? 'failed'}`));
              try {
                const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60_000 });
                await page.waitForTimeout(3000);
                const title = await page.title();
                const body = (await page.locator('body').innerText().catch(() => '')).slice(0, 1000);
                const headingCount = await page.getByRole('heading', { name: 'Aaja Audio Game Engine', exact: true }).count();
                console.log('--- URL', url);
                console.log('final URL:', page.url());
                console.log('status:', response?.status());
                console.log('content-type:', response?.headers()['content-type']);
                console.log('title:', JSON.stringify(title));
                console.log('heading count:', headingCount);
                console.log('body:', JSON.stringify(body));
                console.log(events.join('\n'));
                if (response?.ok() && headingCount === 1) {
                  winner = url;
                  await page.close();
                  break;
                }
              } catch (error) {
                console.log('--- URL', url);
                console.log('probe error:', error instanceof Error ? error.stack : String(error));
                console.log(events.join('\n'));
              }
              await page.close();
            }
          } finally {
            await browser.close();
          }
          if (!winner) throw new Error('No mirror rendered the listening lab in WebKit');
          console.log(`WORKING_WEBKIT_URL=${winner}`);
          JS
          status=$?
          printf '%s\n' "$status" > mirror-webkit.status
          cat mirror-webkit.log
          exit 0

      - name: Upload mirror diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mirror-webkit-diagnostics
          path: |
            mirror-webkit.log
            mirror-webkit.status
          if-no-files-found: error
          retention-days: 7

      - name: Require a rendered mirror
        shell: bash
        run: |
          status="$(cat mirror-webkit.status)"
          if [[ "$status" != "0" ]]; then
            cat mirror-webkit.log
            exit "$status"
          fi
