name: Cleanup real audio integration

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]

permissions:
  contents: write

jobs:
  cleanup:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feature/real-world-audio-tests'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout fixed same-repository feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/real-world-audio-tests
          fetch-depth: 0

      - name: Remove repeated integration fragments and add guard test
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def keep_one_line(path, line):
              file = Path(path)
              lines = file.read_text(encoding="utf-8").splitlines(keepends=True)
              seen = False
              output = []
              for current in lines:
                  if current == line:
                      if seen:
                          continue
                      seen = True
                  output.append(current)
              if not seen:
                  raise SystemExit(f"{path}: expected line not found")
              file.write_text("".join(output), encoding="utf-8")

          keep_one_line(
              "demo/src/main.js",
              'import { getSelectedSampleLabel, getSelectedSampleUrl, releaseSampleLibrary } from "./sample-library.js";\n',
          )
          keep_one_line(
              "scripts/copy-demo.mjs",
              'await cp("demo/assets", "demo/dist/assets", { recursive: true });\n',
          )

          ui_path = Path("demo/src/feature-tour-ui.js")
          ui = ui_path.read_text(encoding="utf-8")
          block = '''function updateSampleDescription() {
            sampleDescription.textContent = getSelectedSampleSummary();
          }

          sampleSelect.addEventListener("change", () => {
            updateSampleDescription();
            announce(`Тестовый звук изменён: ${getSelectedSampleLabel()}.`);
          });
          '''
          if ui.count(block) < 1:
              raise SystemExit("feature-tour-ui.js: sample selector block not found")
          while ui.count(block) > 1:
              ui = ui.replace(block, "", 1)
          ui_path.write_text(ui, encoding="utf-8")

          test_path = Path("tests/audio-assets.test.mjs")
          tests = test_path.read_text(encoding="utf-8")
          guard = '''
          test("real-audio integration fragments are not duplicated", async () => {
            const main = await readFile("demo/src/main.js", "utf8");
            assert.equal((main.match(/from "\\.\\/sample-library\\.js"/g) ?? []).length, 1);

            const tourUi = await readFile("demo/src/feature-tour-ui.js", "utf8");
            assert.equal((tourUi.match(/function updateSampleDescription/g) ?? []).length, 1);
            assert.equal((tourUi.match(/sampleSelect\\.addEventListener/g) ?? []).length, 1);

            const copyScript = await readFile("scripts/copy-demo.mjs", "utf8");
            assert.equal((copyScript.match(/demo\\/assets/g) ?? []).length, 2);
          });
          '''
          marker = 'test("real-audio integration fragments are not duplicated"'
          if marker not in tests:
              test_path.write_text(tests.rstrip() + "\n" + guard, encoding="utf-8")
          PY

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo/src/main.js demo/src/feature-tour-ui.js scripts/copy-demo.mjs tests/audio-assets.test.mjs
          if git diff --cached --quiet; then
            echo "Integration is already clean."
            exit 0
          fi
          git commit -m "Clean up real audio integration"
          git fetch origin feature/real-world-audio-tests
          git rebase origin/feature/real-world-audio-tests
          git push origin HEAD:feature/real-world-audio-tests
